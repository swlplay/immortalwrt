name: Stepwise Build (Toolchain + Kernel then Packages)

on:
  # 手动触发：允许在网页上手动触发
  workflow_dispatch:

jobs:
  build-stage1:
    runs-on: ubuntu-22.04
    steps:
          - name: 释放前查看磁盘空间
      run: df -h

    - name: 手动删除额外工具缓存并清理 apt 缓存
      run: |
        echo "删除 /opt/hostedtoolcache ..."
        sudo rm -rf /opt/hostedtoolcache
        echo "删除其他大目录 ..."
        sudo rm -rf /usr/share/swift /usr/local/julia* /usr/lib/jvm /usr/local/.ghcup /usr/local/share/chromium /usr/share/dotnet /usr/local/lib/android
    
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # 确保拉取所有分支和历史，以便后续推送
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 安装编译依赖
      run: |
        sudo -E bash "$GITHUB_WORKSPACE/swlplay/init_build_environment.sh"

        sudo -E bash "$GITHUB_WORKSPACE/swlplay/init_build_environment.sh"
           
    - name: 编译依赖按装后磁盘空间
      run: df -h
      - name: Clone ImmortalWrt source
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt.git source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for x86_64 target
        working-directory: source
        run: |
          echo "CONFIG_TARGET_x86=y" > .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
          make defconfig

      - name: Download all source tarballs
        working-directory: source
        run: make download -j$(nproc) V=s

      - name: Build toolchain and kernel only
        working-directory: source
        run: |
          make toolchain/compile -j$(nproc) V=s
          make target/linux/compile -j$(nproc) V=s

      - name: Package essential build artifacts
        run: |
          cd source
          tar -czf ../build-artifacts-stage1.tar.gz \
            --exclude='build_dir/target-*/**/*.o' \
            --exclude='build_dir/target-*/**/*.la' \
            --exclude='*.ipk' \
            --exclude='*.bin' \
            --exclude='*.elf' \
            .

      - name: Upload artifacts for stage 2
        uses: actions/upload-artifact@v4
        with:
          name: build-stage1
          path: build-artifacts-stage1.tar.gz
          retention-days: 1

  build-stage2:
    runs-on: ubuntu-22.04
    needs: build-stage1
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3 python3-distutils python3-setuptools rsync unzip zlib1g-dev \
          file wget

      - name: Download stage1 artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-stage1
          path: .

      - name: Extract artifacts into source directory
        run: |
          mkdir -p source
          tar -xzf build-artifacts-stage1.tar.gz -C source
          rm build-artifacts-stage1.tar.gz

      - name: Verify extracted content
        run: |
          if [ -f source/Makefile ]; then
            echo "✓ Makefile found"
          else
            echo "✗ Makefile NOT found"
            exit 1
          fi

      - name: Continue building packages and final firmware
        working-directory: source
        run: make -j$(nproc) V=s

      - name: Upload built firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-x86-64
          path: source/bin/targets/x86/64/*.img.gz
          retention-days: 7
